<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Form - Bharatiya Vidvat Parishat</title>
    <base target="_top">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #f5f3f0 0%, #e8e4df 100%);
            min-height: 100vh;
            padding: 20px;
            color: #4a4a4a;
        }

        .form-container {
            background: #ffffff;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.1);
            border: 2px solid #d4af37;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            transition: transform 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(139, 69, 19, 0.15);
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 3px solid #d4af37;
            padding-bottom: 20px;
        }

        .form-header h1 {
            color: #8b4513;
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .form-header p {
            color: #8b4513;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .section {
            margin-bottom: 35px;
            padding: 25px;
            background: #faf9f7;
            border-radius: 12px;
            border-left: 4px solid #d4af37;
        }

        .section-title {
            color: #8b4513;
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .amount-selection {
            margin-bottom: 25px;
        }

        .amount-label {
            display: block;
            margin-bottom: 15px;
            color: #8b4513;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .amount-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .amount-btn {
            padding: 15px;
            border: 2px solid #d4af37;
            background: #ffffff;
            color: #8b4513;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .amount-btn:hover {
            background: #d4af37;
            color: #ffffff;
            transform: translateY(-2px);
        }

        .amount-btn.selected {
            background: #8b4513;
            color: #ffffff;
            border-color: #8b4513;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #8b4513;
            font-weight: 600;
            font-size: 1rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e8e4df;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #ffffff;
            color: #4a4a4a;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            border: 2px dashed #d4af37;
            border-radius: 8px;
            background: #faf9f7;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #8b4513;
            font-weight: 600;
        }

        .file-input-label:hover {
            background: #f0ede8;
            border-color: #8b4513;
        }

        .file-name {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #8b4513;
            padding: 8px;
            background: #f0ede8;
            border-radius: 5px;
        }

        .privacy-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .privacy-options label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8b4513;
            cursor: pointer;
        }

        .privacy-options input[type="checkbox"] {
            width: auto;
            accent-color: #d4af37;
        }

        .payment-info {
            background: #f0ede8;
            border: 2px solid #d4af37;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .qr-code {
            max-width: 200px;
            height: auto;
            margin: 15px 0;
            border-radius: 8px;
        }

        .bank-details {
            text-align: left;
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .bank-details p {
            margin-bottom: 8px;
            color: #8b4513;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, #8b4513, #a0522d);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .submit-btn:hover {
            background: linear-gradient(45deg, #a0522d, #8b4513);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            background: #d4af37;
            color: #8b4513;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
            border: 2px solid #8b4513;
        }

        .error-message {
            background: #f4f4f4;
            color: #8b4513;
            border: 2px solid #cd853f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 25px 20px;
            }
            
            .form-header h1 {
                font-size: 1.8rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .amount-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>Support Scholarly Excellence</h1>
            <p>Your contribution enables the preservation and advancement of India's intellectual traditions</p>
        </div>

        <div class="success-message" id="successMessage">
            Form submitted successfully! We'll process your contribution and send you a confirmation.
        </div>

        <div class="error-message" id="errorMessage">
            There was an error submitting your form. Please try again.
        </div>

        
    </div>

    <script>
        // Amount selection handling
        document.querySelectorAll('.amount-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove selected class from all buttons
                document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
                
                // Add selected class to clicked button
                this.classList.add('selected');
                
                if (this.classList.contains('custom')) {
                    document.getElementById('amount').focus();
                } else {
                    const amount = this.getAttribute('data-amount');
                    document.getElementById('amount').value = amount;
                }
            });
        });

        // File input handling
        document.getElementById("fileInput").addEventListener("change", function(e) {
            const fileName = e.target.files[0]?.name || "No file selected";
            document.getElementById("fileName").textContent = fileName;
        });

        // Form submission handling
        document.getElementById("contactForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const form = e.target;
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];
            const submitBtn = document.querySelector('.submit-btn');
            const btnText = document.querySelector('.btn-text');
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            // Hide previous messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            
            // Show loading state
            submitBtn.disabled = true;
            btnText.style.visibility = 'hidden';
            loading.style.display = 'block';
            
            if (!file) {
                showError("Please select a file to upload (payment receipt or supporting document).");
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Data = event.target.result.split(",")[1];
                const formData = {
                    amount: form.amount.value,
                    name: form.name.value,
                    title: form.title.value,
                    email: form.email.value,
                    phone: form.phone.value,
                    institution: form.institution.value,
                    purpose: form.purpose.value,
                    message: form.message.value,
                    anonymous: form.anonymous.checked,
                    receipt: form.receipt.checked,
                    filename: file.name,
                    mimeType: file.type,
                    base64: base64Data
                };
                
                // Call Google Apps Script function
                google.script.run
                    .withSuccessHandler(function(response) {
                        showSuccess();
                        form.reset();
                        document.getElementById("fileName").textContent = "";
                        document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
                    })
                    .withFailureHandler(function(error) {
                        showError("Error: " + error.message);
                    })
                    .handleForm(formData);
            };
            
            reader.onerror = function() {
                showError("Error reading file. Please try again.");
            };
            
            reader.readAsDataURL(file);
        });
        
        function showSuccess() {
            const submitBtn = document.querySelector('.submit-btn');
            const btnText = document.querySelector('.btn-text');
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            
            submitBtn.disabled = false;
            btnText.style.visibility = 'visible';
            loading.style.display = 'none';
            successMessage.style.display = 'block';
            
            // Scroll to success message
            successMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function showError(message) {
            const submitBtn = document.querySelector('.submit-btn');
            const btnText = document.querySelector('.btn-text');
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            
            submitBtn.disabled = false;
            btnText.style.visibility = 'visible';
            loading.style.display = 'none';
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            
            // Scroll to error message
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

    </script>
    
</body>
</html>
